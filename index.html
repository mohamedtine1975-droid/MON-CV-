        }

            background: white;
            color: #180501;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .lang-btn.active {
            background: #180501;
            color: white;
        }

        .lang-btn:hover:not(.active) {

        }

        .download-btn {

            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;

            display: flex;
            align-items: center;
            gap: 8px;
        }

        .download-btn:hover {
            background: #FCC6BB;
            color: #180501;
            transform: translateY(-2px);
            box-shadow: 0 6px 8px rgba(0,0,0,0.15);

        .download-btn:disabled {
            background: #ccc;
            cursor: not-allowed;

            font-size: 0.8em;

            color: #333;
            font-size: 0.9em;

            color: #180501;

        function changeLanguage(lang) {
            currentLang = lang;
            const t = translations[lang];

            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.lang === lang) {
                    btn.classList.add('active');
                }
            });

            document.getElementById('jobTitle').textContent = t.jobTitle;
            document.getElementById('location').textContent = t.location;
            document.getElementById('downloadText').textContent = t.downloadText;

            renderContent(lang);
        }

        function generatePDF() {
            const button = document.getElementById('downloadBtn');
            const buttonText = document.getElementById('downloadText');
            const t = translations[currentLang];
            const originalText = buttonText.textContent;
            
            button.disabled = true;
            buttonText.textContent = t.downloadingText;
            
            const element = document.getElementById('cv-content');
            
            const date = new Date();
            const months = {
                fr: ['JANVIER', 'FEVRIER', 'MARS', 'AVRIL', 'MAI', 'JUIN', 
                     'JUILLET', 'AOUT', 'SEPTEMBRE', 'OCTOBRE', 'NOVEMBRE', 'DECEMBRE'],
                en: ['JANUARY', 'FEBRUARY', 'MARCH', 'APRIL', 'MAY', 'JUNE', 
                     'JULY', 'AUGUST', 'SEPTEMBER', 'OCTOBER', 'NOVEMBER', 'DECEMBER']
            };
            const month = months[currentLang][date.getMonth()];
            const year = date.getFullYear();
            const fileName = `CV_Mohamed_Dieye_TINE_${month}_${year}.pdf`;

            const opt = {
                margin: [10, 10, 10, 10],
                filename: fileName,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { 
                    scale: 2,
                    useCORS: true,
                    letterRendering: true
                },
                jsPDF: { 
                    unit: 'mm', 
                    format: 'a4', 
                    orientation: 'portrait'
                },
                pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
            };
            
            // Exécution de la génération
            html2pdf().set(opt).from(element).save().then(() => {
                button.disabled = false;
                buttonText.textContent = originalText;
            }).catch(err => {
                console.error('Erreur PDF:', err);
                button.disabled = false;
                buttonText.textContent = "Erreur !";
            });
        }

        // Initialisation au chargement de la page
        window.onload = () => {
            renderContent(currentLang);
        };
    </script>
</body>
</html>
