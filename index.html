<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CV de Mohamed Dieye TINE - Développeur Backend & Designer">
    
    <!-- Open Graph SEO & Partage (LinkedIn, WhatsApp...) -->
    <meta property="og:title" content="CV - Mohamed Dieye TINE">
    <meta property="og:description" content="Développeur Backend & Designer - Explorez mes expériences et mon portfolio.">
    <meta property="og:type" content="profile">
    
    <title>CV - Mohamed Dieye TINE</title>
    <!-- Chargement différé du script lourd pour ne pas bloquer l'affichage visuel -->
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="controls">
        <div class="lang-selector">
            <button class="lang-btn active" onclick="changeLanguage('fr')" data-lang="fr">FR</button>
            <button class="lang-btn" onclick="changeLanguage('en')" data-lang="en">EN</button>
        </div>
        
        <button class="download-btn" onclick="toggleTheme()" id="theme-icon" aria-label="Changer de thème" style="padding: 12px; margin-right: 5px;">
            <i class="fa-solid fa-moon"></i>
        </button>
        <button class="download-btn" onclick="generatePDF()" id="downloadBtn">
            <i class="fa-solid fa-file-pdf" id="downloadIcon" style="margin-right: 5px;"></i>
            <span id="downloadText">Télécharger PDF</span>
        </button>
    </div>
    
    <div class="container" id="cv-content">
        <header class="header">
            <h1>Mohamed Dieye TINE</h1>
            <div class="title" id="jobTitle">Développeur Backend • Designer</div>
            <div class="contact-info">
                <div class="contact-item" aria-label="Téléphone">
                    <i class="fa-solid fa-phone" aria-hidden="true"></i>
                    <span>+221 76 021 93 52</span>
                </div>
                <div class="contact-item" aria-label="Email">
                    <i class="fa-solid fa-envelope" aria-hidden="true"></i>
                    <span>mohamedtine1975@gmail.com</span>
                </div>
                <div class="contact-item" aria-label="Adresse">
                    <i class="fa-solid fa-location-dot" aria-hidden="true"></i>
                    <span id="location">Rufisque, Sénégal</span>
                </div>
            </div>
        </header>

        <div class="main-content" id="mainContent">
            <!-- Le contenu sera généré dynamiquement par JavaScript -->
        </div>
    </div>

    <script defer src="js/main.js"></script>
</body>
</html>
